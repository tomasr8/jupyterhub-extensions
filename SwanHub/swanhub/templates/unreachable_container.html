{% extends "page.html" %}
{% if announcement_home %}
  {% set announcement = announcement_home %}
{% endif %}

{% block main %}
<div class="container">
  <div class="row">
    <div id="swan-loader" class="d-flex flex-column align-items-center justify-content-center gap-3 py-5 animate">
      <div class="loader-ring">
        <img src="{{ static_url('swan/logos/' + swan_logo_filename) }}" alt="SWAN logo">
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block script %}
{{ super() }}
<script type="text/javascript">
window.location.replace('{{base_url}}home?changeconfig');
</script>
{% endblock %}
