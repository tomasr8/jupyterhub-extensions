{% extends "page.html" %}

{% block main %}
<div class="container">
  <div class="row">
    <div id="swan-loader" class="d-flex flex-column align-items-center justify-content-center gap-3 py-5 animate">
      <div class="loader-ring">
        <img src="{{ static_url('swan/logos/' + swan_logo_filename) }}" alt="SWAN logo">
      </div>
      <div class="loader-text text-body-secondary text-center">
        <h2 class="text-body-secondary">Starting your session...</h2>
        <p>You will be redirected automatically when it's ready for you.</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block script %}
<script type="text/javascript">
require(["jquery"], function ($) {
  // hook up event-stream for progress
  var evtSource = new EventSource("{{ progress_url }}");
  evtSource.onmessage = function(e) {
    var evt = JSON.parse(e.data);
    console.log(evt);
    if (evt.ready) {
      evtSource.close();
      // reload the current page
      // which should result in a redirect to the running server
      window.location.reload();
    }
    if (evt.failed) {
      evtSource.close();
      window.location.replace('{{base_url}}spawn?failed');
    }
  }
});
// signal that page has finished loading (mostly for tests)
window._jupyterhub_page_loaded = true;
</script>
{% endblock %}
