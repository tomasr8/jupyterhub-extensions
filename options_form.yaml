global:
  generic:
    lcg: &lcgGeneric "LCG_108_swan"
    lcgText: &lcgTextGeneric "108"
    platform: &platformGeneric "x86_64-el9-gcc13-opt"
    platformText: &platformTextGeneric "AlmaLinux 9 (gcc13)"
  cuda:
    lcg: &lcgCuda "LCG_108_cuda"
    lcgText: &lcgTextCuda "108 CUDA 12.5 (GPU)"
    platform: &platformCuda "x86_64-el9-gcc13-opt"
    platformText: &platformTextCuda "AlmaLinux 9 (gcc13)"
  nxcals:
    lcg:  &lcgNxcals "LCG_106a_nxcals_pro"
    lcgText: &lcgTextNxcals "106a NXCALS PRO"
    platform: &platformNxcals "x86_64-el9-gcc13-opt"
    platformText: &platformTextNxcals "AlmaLinux 9 (gcc13)"

optionsform:
